# PipeWire receiver for the reac-aes67 AES67 demo stream (REAC-A).
#
# Install as a persistent receiver:
#   mkdir -p ~/.config/pipewire/pipewire.conf.d
#   cp demo/reac-a-rtp-source.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire
# A 40-channel "REAC-A (AES67)" source node then appears in wpctl/qpwgraph.
#
# Matches the daemon defaults: reac-aes67 --gen-tone --rate 48000 --udp 239.69.0.1:5004
# (group 239.69.0.1, port 5004, payload type 97, L24/48000/40, BE samples).
context.modules = [
  { name = libpipewire-module-rtp-source
    args = {
      source.ip = 239.69.0.1
      source.port = 5004
      sess.latency.msec = 100
      audio.format = S24BE
      audio.rate = 48000
      audio.channels = 40
      stream.props = {
        media.class = Audio/Source
        node.name = reac-a-rtp
        node.description = "REAC-A (AES67)"
      }
    }
  }
]
