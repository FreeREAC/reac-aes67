# PipeWire SAP discovery for reac-aes67 / AES67 streams.
#
# Install once on any Linux receiver — it auto-creates a node for EVERY stream
# announced via SAP (no per-stream config; add/remove streams and they appear/
# age out automatically). Replaces the old per-stream reac-a-rtp-source.conf.
#
#   mkdir -p ~/.config/pipewire/pipewire.conf.d
#   cp demo/reac-sap-discover.conf ~/.config/pipewire/pipewire.conf.d/
#   systemctl --user restart pipewire
#
# Each reac-aes67 daemon announces its stream's SDP to 224.0.0.56:9875 (SAP);
# this module listens there and instantiates an rtp-source node per session.
# The node is named from the SDP session name (e.g. "REAC-A").
context.modules = [
  { name = libpipewire-module-rtp-sap
    args = {
      # discover mode: no sess.sap.announce rule -> listen + create-stream
      sap.ip = 224.0.0.56
      sap.port = 9875
      sap.cleanup.sec = 90
      stream.rules = [
        { matches = [ { sess.sap.announce = false } ]
          actions = { create-stream = {
            stream.props = { media.class = Audio/Source }
          } } }
      ]
    }
  }
]
