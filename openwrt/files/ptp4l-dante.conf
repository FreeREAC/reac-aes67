# ptp4l configuration for the reac-aes67 Dante-interop profile.
#
# Makes the OpenWrt router a PTPv2 (IEEE 1588-2008) FOLLOWER in the AES67 clock
# domain (domain 0) so its CLOCK_TAI is disciplined to the same grandmaster the
# Dante AES67 devices use. reac-aes67 --profile dante reads CLOCK_TAI to anchor
# the RTP timestamps (RFC 7273 mediaclk:direct=0).
#
# IMPORTANT — slave-only. The mt7621 / MT7986 (filogic) ethernet MACs have NO
# PTP hardware clock, so only SOFTWARE timestamping is available (microsecond
# class). That is fine for a follower but must NEVER win the BMCA grandmaster
# election; slaveOnly 1 + a deliberately weak clockClass keep the router from
# advertising itself as a better clock than the Dante/house grandmaster.
#
# Install:  opkg/apk add linuxptp ; cp ptp4l-dante.conf /etc/ ;
#           ptp4l -f /etc/ptp4l-dante.conf -i <reac/aes67 iface>
# Verify :  pmc -u -b 0 'GET TIME_STATUS_NP'      (gmPresent=1, small offset)
#           pmc -u -b 0 'GET CLOCK_DESCRIPTION'   (read the grandmaster clockId
#                                                  for the stream's 'gmid' option)
#
# This is a DEPLOYMENT artifact; live PTP lock + Dante acceptance are validated
# on the rig, not in CI.

[global]
slaveOnly               1
domainNumber            0
priority1               255
priority2               255
clockClass              255
time_stamping           software
network_transport       UDPv4
delay_mechanism         E2E
logSyncInterval         -3
logMinDelayReqInterval  -3
tx_timestamp_timeout    50
summary_interval        4
# AES67 marks PTP event traffic DSCP 46 (EF); media (the RTP flows) is AF41.
dscp_event              46
dscp_general            46
