# reac-aes67 bridge configuration.
# REAC_IFACE: the NIC carrying the REAC 0x8819 stream (the wired link to the desk).
# AES67_DEST: AES67 RTP-L24 multicast destination IP:PORT (e.g. 239.69.x.x:5004).
# REAC_RATE:  48000 | 96000 | auto
# EXTRA_ARGS: extra flags, e.g. "--sap --name STAGE-A --ttl 8 --pt 97".
#             --sap announces the stream for AES67 auto-discovery;
#             --profile dante enables Dante-interop framing.
REAC_IFACE=reac0
AES67_DEST=239.69.1.1:5004
REAC_RATE=auto
EXTRA_ARGS=--sap
